# Blueprint: https://dashboard.render.com/blueprints
# Web Service + Telegram webhook (health check на /health)
services:
  - type: web
    name: nutricoach-bot
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_MODE
        value: webhook
      - key: DATABASE_PATH
        value: data/nutricoach.db
      - key: BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: PRO_MONTH_STARS
        value: "150"
      - key: PRO_YEAR_STARS
        value: "1200"
