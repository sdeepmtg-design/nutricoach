# Бесплатный Web Service + webhook (бот не засыпает, если есть трафик).
# После первого деплоя добавь WEBHOOK_URL=https://<имя-сервиса>.onrender.com
services:
  - type: web
    name: nutricoach-bot
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_MODE
        value: webhook
      - key: DATABASE_PATH
        value: data/nutricoach.db
      - key: BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
